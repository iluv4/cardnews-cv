<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cardnews-cv · 레퍼런스 검색 → 카드 생성</title>
<style>
  :root { --bg:#0e1116; --panel:#171b22; --line:#262c36; --fg:#e7ebf0;
          --muted:#8b95a3; --accent:#f7889a; --accent2:#5cc8a0; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,"Malgun Gothic",sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line);
           display:flex; gap:14px; align-items:center; }
  header h1 { font-size:15px; margin:0; font-weight:700; }
  header .sub { color:var(--muted); font-size:12px; }
  .wrap { display:grid; grid-template-columns:1fr 360px; gap:0; height:calc(100vh - 53px); }
  .left { padding:16px 20px; overflow:auto; }
  .right { border-left:1px solid var(--line); padding:16px 18px; overflow:auto;
           background:var(--panel); }
  .right h2 { font-size:14px; margin:0 0 2px; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center; }
  input,select,button,textarea { font:inherit; color:var(--fg);
        background:#0f131a; border:1px solid var(--line); border-radius:8px;
        padding:8px 10px; }
  button { cursor:pointer; background:#202733; }
  button.primary { background:var(--accent); color:#2a0d14; border:none; font-weight:700; }
  .chip { padding:8px 14px; border-radius:999px; font-size:12px; min-height:34px; }
  .chip[aria-pressed="true"] { background:var(--accent2); color:#06291f; border-color:transparent; }
  /* visible focus indicator on every interactive element (2.4.7) */
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
  textarea:focus-visible, [role="button"]:focus-visible {
    outline:2px solid var(--accent); outline-offset:2px; }
  /* screen-reader-only labels (1.3.1 / 3.3.2) */
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
          gap:10px; }
  .card { border:1px solid var(--line); border-radius:10px; overflow:hidden;
          background:#0f131a; cursor:pointer; transition:.12s; position:relative;
          padding:0; text-align:left; width:100%; }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .card.sel { outline:2px solid var(--accent); }
  .card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
  .card .meta { padding:6px 8px; font-size:11px; color:var(--muted);
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card .tpl { position:absolute; top:6px; left:6px; background:var(--accent2);
               color:#06291f; font-size:10px; font-weight:700; padding:2px 6px;
               border-radius:6px; }
  .card .pal { display:flex; height:5px; }
  .card .pal i { flex:1; }
  label { font-size:12px; color:var(--muted); display:block; margin:10px 0 4px; }
  textarea { width:100%; resize:vertical; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  #preview { width:100%; border-radius:12px; border:1px solid var(--line);
             margin-top:10px; background:#0f131a; }
  .hint { color:var(--muted); font-size:12px; }
  .count { color:var(--muted); font-size:12px; margin:0 0 10px; }
</style>
</head>
<body>
<header>
  <h1>cardnews-cv</h1>
  <span class="sub">레퍼런스 라이브러리 검색 → 선택 → 자동 채움 → 카드 생성</span>
</header>
<main class="wrap">
  <section class="left" aria-label="레퍼런스 검색 및 결과">
    <h2 class="sr-only">레퍼런스 검색</h2>
    <div class="controls" role="search">
      <label for="q" class="sr-only">주제 검색</label>
      <input id="q" placeholder="주제 검색 (예: smart farm, hanok, support)" style="flex:2;min-width:220px">
      <label for="color" class="sr-only">색상 (hex 코드)</label>
      <input id="color" placeholder="#15402b" style="width:110px">
      <button type="button" class="chip" data-f="dark" aria-pressed="false">다크</button>
      <button type="button" class="chip" data-f="cover" aria-pressed="false">표지</button>
      <button type="button" class="chip" data-f="tpl" aria-pressed="false">레이아웃만</button>
      <button type="button" onclick="search()">검색</button>
      <button type="button" onclick="reset()">초기화</button>
    </div>
    <p class="count" id="count" aria-live="polite"></p>
    <div class="grid" id="grid" role="list" aria-label="검색된 레퍼런스"></div>
  </section>

  <section class="right" aria-label="카드 생성">
    <h2>카드 생성</h2>
    <p class="hint" id="selinfo" aria-live="polite">레퍼런스를 선택하면 톤/테마가 자동 적용됩니다.</p>
    <label for="title">제목 (줄바꿈 = Enter)</label>
    <textarea id="title" rows="2">스마트팜으로\n바뀌는 농업</textarea>
    <label for="subtitle">부제 (*키워드* = 강조)</label>
    <textarea id="subtitle" rows="2">복잡한 지원사업, *핵심만* 한 장에 정리했어요</textarea>
    <label for="checklist">체크리스트 (한 줄에 하나)</label>
    <textarea id="checklist" rows="3">신청 자격과 기간 한눈에
필요 서류와 절차 정리
문의처와 마감일까지</textarea>
    <div class="row">
      <div><label for="theme">테마</label>
        <select id="theme">
          <option>forest</option><option>midnight</option><option>coral</option>
          <option>sky</option><option>mint</option><option>mono</option>
        </select></div>
      <div><label for="brand">브랜드</label><input id="brand" value="AGRI"></div>
    </div>
    <button type="button" class="primary" style="width:100%;margin-top:14px" onclick="generate()">생성</button>
    <img id="preview" alt="생성된 카드 미리보기 (아직 없음)">
  </section>
</main>

<script>
const F = { dark:false, cover:false, tpl:false };
let selected = null;

document.querySelectorAll('.chip').forEach(c => c.onclick = () => {
  F[c.dataset.f] = !F[c.dataset.f];
  c.setAttribute('aria-pressed', String(F[c.dataset.f]));
  search();
});

function qs() {
  const p = new URLSearchParams();
  const q = document.getElementById('q').value.trim();
  const c = document.getElementById('color').value.trim();
  if (q) p.set('text', q);
  if (c) p.set('color', c);
  if (F.dark) p.set('dark', 'true');
  if (F.cover) p.set('cover', 'true');
  if (F.tpl) p.set('only_templates', 'true');
  p.set('k', '36');
  return p.toString();
}

async function search() {
  const r = await fetch('/api/search?' + qs());
  render((await r.json()));
}
function reset() {
  document.getElementById('q').value = '';
  document.getElementById('color').value = '';
  F.dark = F.cover = F.tpl = false;
  document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
  search();
}

function render(data) {
  document.getElementById('count').textContent = data.count + ' 레퍼런스';
  const g = document.getElementById('grid'); g.innerHTML = '';
  data.results.forEach(r => {
    const isSel = selected && selected.id === r.id;
    const el = document.createElement('div');
    el.className = 'card' + (isSel ? ' sel' : '');
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-pressed', isSel ? 'true' : 'false');
    el.setAttribute('aria-label',
      `레퍼런스 ${r.deck} 선택${r.has_template ? ' (실제 레이아웃 복사 가능)' : ''}`);
    const pal = (r.palette || []).slice(0,5)
      .map(c => `<i style="background:rgb(${c[0]},${c[1]},${c[2]})"></i>`).join('');
    const badge = r.has_template ? '<div class="tpl">레이아웃</div>' : '';
    el.innerHTML =
      `<img loading="lazy" alt="레퍼런스 미리보기: ${r.deck}" src="/api/reference/${encodeURIComponent(r.id)}?w=320">${badge}
       <div class="pal" aria-hidden="true">${pal}</div>
       <div class="meta">${r.theme} · ${r.dark?'dark':'light'} · ${r.deck.slice(0,22)}</div>`;
    el.onclick = () => select(r, el);
    el.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(r, el); }
    };
    g.appendChild(el);
  });
}

function select(r, el) {
  selected = r;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('sel'); c.setAttribute('aria-pressed', 'false');
  });
  el.classList.add('sel'); el.setAttribute('aria-pressed', 'true');
  document.getElementById('theme').value = r.theme;
  document.getElementById('selinfo').textContent = r.has_template
    ? `선택: ${r.id} → 이 레퍼런스의 실제 레이아웃을 복사해 채웁니다`
    : `선택: ${r.id} → 템플릿 없음, 테마 "${r.theme}"로 생성`;
}

async function generate() {
  const title = document.getElementById('title').value.replace(/\\n/g, '\n');
  const subtitle = document.getElementById('subtitle').value || null;
  let checklist = document.getElementById('checklist').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!checklist.length) checklist = null;
  const brand = document.getElementById('brand').value || null;

  let url, body;
  if (selected) {                 // copy the chosen reference's layout (or themed fallback)
    url = '/api/generate_from_ref';
    body = { ref_id: selected.id, title, subtitle, checklist, brand, size: 1080 };
  } else {                        // no selection -> manual theme
    url = '/api/generate';
    body = { title, subtitle, checklist, theme: document.getElementById('theme').value, brand, size: 1080 };
  }
  const r = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (!r.ok) { alert('생성 실패: ' + await r.text()); return; }
  const mode = r.headers.get('X-Render-Mode');
  const img = document.getElementById('preview');
  img.src = URL.createObjectURL(await r.blob());
  img.alt = `생성된 카드: ${title.replace(/\n/g, ' ')}`;
  if (mode) document.getElementById('selinfo').textContent =
    `생성 완료 (${mode === 'template' ? '레이아웃 복사' : '테마 폴백'})`;
}

search();
</script>
</body>
</html>
